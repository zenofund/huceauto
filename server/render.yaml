services:
  - type: web
    name: huce-autos-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
  - type: static
    name: huce-autos-web
    env: static
    plan: free
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: build
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_MAPBOX_TOKEN
        sync: false
